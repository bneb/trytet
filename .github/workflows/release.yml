name: Release

on:
  push:
    tags: ["v*"]

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --bin tet --target ${{ matrix.target }}
      - run: |
          cd target/${{ matrix.target }}/release
          tar czf tet-${{ matrix.suffix }}.tar.gz tet
      - uses: actions/upload-artifact@v4
        with:
          name: tet-${{ matrix.suffix }}
          path: target/${{ matrix.target }}/release/tet-${{ matrix.suffix }}.tar.gz

  release:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: sha256sum tet-*.tar.gz | tee SHA256SUMS
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            tet-*.tar.gz
            SHA256SUMS
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/bneb/trytet
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
