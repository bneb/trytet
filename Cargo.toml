[package]
name = "tet-core"
version = "0.1.0"
edition = "2021"
description = "Sub-millisecond, hyper-ephemeral Wasm execution substrate for Agentic AI"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }
wasmtime = "43"
wasmtime-wasi = "43"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
tempfile = "3.27.0"
tar = "0.4.45"
clap = { version = "4.6.0", features = ["derive"] }
indicatif = "0.18.4"
colored = "3.1.1"
reqwest = { version = "0.13.2", features = ["json"] }
sha2 = "0.11.0"
ed25519-dalek = "2.2.0"
rand = "0.10.0"
home = "0.5.12"
hex = "0.4.3"

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
wat = "1"
